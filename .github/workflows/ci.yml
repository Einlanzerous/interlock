name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      # Empty Postgres 16 for the @interlock/db migration integration tests.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: interlock
          POSTGRES_PASSWORD: interlock
          POSTGRES_DB: interlock
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U interlock -d interlock"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Node is used by Nuxt's typecheck (vue-tsc); ubuntu-latest ships it,
      # but pin it so fnm/CI stay aligned with .node-version.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
        env:
          DATABASE_URL: postgres://interlock:interlock@localhost:5432/interlock
