<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 46 46" width="46" height="46">
  <!--
    The Interlock mark: conflicting signals converging on one junction, which is the whole
    product in a glyph. Same geometry as the masthead in app.vue.

    Two departures from the masthead version, both because a favicon is 16px:
      - a filled rounded square, so the cyan has something to sit on in a browser tab
        rather than dissolving into whatever the tab strip's colour is;
      - fatter strokes (3 / 2.8 vs 2.4), because hairlines vanish at that size.
  -->
  <rect width="46" height="46" rx="10" fill="#0d0f12"/>
  <g stroke-linecap="round">
    <line x1="4" y1="12" x2="24" y2="23" stroke="#4db6d9" stroke-width="3"/>
    <line x1="4" y1="23" x2="24" y2="23" stroke="#4db6d9" stroke-width="3" opacity="0.45"/>
    <line x1="4" y1="34" x2="24" y2="23" stroke="#4db6d9" stroke-width="3"/>
  </g>
  <circle cx="33" cy="23" r="8.5" fill="none" stroke="#eef1f4" stroke-width="2.8"/>
  <circle cx="33" cy="23" r="3.4" fill="#4db6d9"/>
</svg>
